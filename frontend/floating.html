<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A3Agent</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
        overflow: hidden;
        user-select: none;
      }
      .drag {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      button {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: 32px;
        border: 1px solid rgba(255, 255, 255, 0.85);
        background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.96), rgba(245, 248, 255, 0.88));
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        box-shadow: 0 10px 26px rgba(15, 23, 42, 0.22);
        backdrop-filter: blur(10px);
        cursor: pointer;
        overflow: visible;
        transition: transform 140ms ease, box-shadow 200ms ease, border-color 200ms ease, background 200ms ease;
      }
      button:active { transform: scale(0.96); }
      button::before {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        background: rgba(59, 130, 246, 0.28);
        filter: blur(12px);
        opacity: 1;
        z-index: 0;
        transition: background 220ms ease, opacity 220ms ease, transform 220ms ease;
      }
      button::after {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.55);
        z-index: 1;
        pointer-events: none;
      }
      html[data-state="idle"] button {
        border-color: rgba(147, 197, 253, 0.92);
        box-shadow:
          0 10px 26px rgba(15, 23, 42, 0.22),
          0 0 0 2px rgba(96, 165, 250, 0.22),
          0 0 20px rgba(59, 130, 246, 0.18);
      }
      html[data-state="idle"] button::before {
        background: rgba(37, 99, 235, 0.26);
      }
      html[data-state="running"] button {
        border-color: rgba(251, 191, 36, 0.96);
        background: radial-gradient(circle at 35% 35%, rgba(255, 251, 235, 0.98), rgba(255, 244, 214, 0.92));
        box-shadow:
          0 10px 26px rgba(15, 23, 42, 0.22),
          0 0 0 2px rgba(251, 191, 36, 0.36),
          0 0 28px rgba(245, 158, 11, 0.36);
      }
      html[data-state="running"] button::before {
        background: rgba(245, 158, 11, 0.44);
        animation: glow-pulse 1.6s ease-in-out infinite;
      }
      html[data-state="error"] button {
        border-color: rgba(248, 113, 113, 0.96);
        background: radial-gradient(circle at 35% 35%, rgba(255, 245, 245, 0.98), rgba(255, 226, 226, 0.92));
        box-shadow:
          0 10px 26px rgba(15, 23, 42, 0.22),
          0 0 0 2px rgba(248, 113, 113, 0.36),
          0 0 28px rgba(239, 68, 68, 0.36);
      }
      html[data-state="error"] button::before {
        background: rgba(239, 68, 68, 0.48);
        animation: glow-pulse 1.2s ease-in-out infinite;
      }
      html[data-state="need-user"] button {
        border-color: rgba(248, 113, 113, 0.96);
        background: radial-gradient(circle at 35% 35%, rgba(255, 245, 245, 0.98), rgba(255, 224, 224, 0.94));
        box-shadow:
          0 10px 26px rgba(15, 23, 42, 0.22),
          0 0 0 2px rgba(248, 113, 113, 0.42),
          0 0 30px rgba(239, 68, 68, 0.42);
      }
      html[data-state="need-user"] button::before {
        background: rgba(239, 68, 68, 0.56);
        animation: glow-pulse 1.1s ease-in-out infinite;
      }
      button img {
        position: relative;
        z-index: 2;
        width: 52px;
        height: 52px;
        display: block;
        object-fit: contain;
        filter: drop-shadow(0 2px 4px rgba(15, 23, 42, 0.10));
      }
      @keyframes glow-pulse {
        0%, 100% { transform: scale(0.96); opacity: 0.7; }
        50% { transform: scale(1.05); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="drag">
      <button id="toggle" type="button" aria-label="A3Agent">
        <img alt="A3Agent" src="logo-transparent.png" />
      </button>
    </div>
    <script>
      const { invoke } = window.__TAURI__.core;
      const { getCurrentWindow } = window.__TAURI__.window;
      const appWindow = getCurrentWindow();
      const btn = document.getElementById("toggle");
      let latchedState = "";
      let latchedUntil = 0;
      const latchState = (state, ttlMs = 0) => {
        latchedState = state || "";
        latchedUntil = ttlMs > 0 ? (Date.now() + ttlMs) : 0;
      };
      const applyStatus = (payload) => {
        const explicitState = payload?.state ? String(payload.state) : "";
        const uiState = payload?.ui_state ? String(payload.ui_state) : "";
        const isRunning = !!payload?.is_running;
        const needsHuman = !!payload?.needs_human_input;
        const resolved = explicitState || uiState;
        if (payload?.agent_init_error || resolved === "error") {
          latchState("error", 0);
          document.documentElement.dataset.state = "error";
          return;
        }
        if (resolved === "need-user" || needsHuman) {
          latchState("need-user", 0);
          document.documentElement.dataset.state = "need-user";
          return;
        }
        if (resolved === "running" || isRunning) {
          latchState("running", 7000);
          document.documentElement.dataset.state = "running";
          return;
        }
        if (resolved === "idle") {
          latchState("", 0);
          document.documentElement.dataset.state = "idle";
          return;
        }
        if (latchedState && (!latchedUntil || Date.now() <= latchedUntil)) {
          document.documentElement.dataset.state = latchedState;
          return;
        }
        if (latchedUntil && Date.now() > latchedUntil) {
          latchState("", 0);
        }
        latchState("", 0);
        document.documentElement.dataset.state = "idle";
      };
      const refreshStatus = async () => {
        try {
          const res = await fetch('/api/status', { cache: 'no-store' });
          if (!res.ok) return;
          const data = await res.json();
          applyStatus(data);
        } catch {}
      };
      try {
        const { listen } = window.__TAURI__.event;
        listen("ga-status", (event) => {
          applyStatus(event?.payload || {});
        });
      } catch {}
      refreshStatus();
      setInterval(refreshStatus, 1000);
      let isDragging = false;
      let startX = 0, startY = 0;
      btn.addEventListener("pointerdown", (e) => {
        isDragging = false; startX = e.clientX; startY = e.clientY;
        btn.setPointerCapture(e.pointerId);
      });
      btn.addEventListener("pointermove", async (e) => {
        const dx = e.clientX - startX, dy = e.clientY - startY;
        if (!isDragging && dx * dx + dy * dy > 25) {
          isDragging = true;
          try { await appWindow.startDragging(); } catch (err) { console.error(err); }
        }
      });
      btn.addEventListener("pointerup", async (e) => {
        btn.releasePointerCapture(e.pointerId);
        if (!isDragging) {
          try { await invoke("toggle_main_window"); } catch (err) { console.error(err); }
        }
        isDragging = false;
      });
      btn.addEventListener("pointercancel", (e) => {
        try { btn.releasePointerCapture(e.pointerId); } catch {}
        isDragging = false;
      });
    </script>
  </body>
</html>
